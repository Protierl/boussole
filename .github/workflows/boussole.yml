name: BOUSSOLE 24h/24

on:
  schedule:
    - cron: "17 * * * *"   # toutes les heures, à h:17 (UTC)
  workflow_dispatch:        # bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

concurrency:
  group: boussole
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dépendances
        run: pip install --quiet requests matplotlib

      - name: Cycle du bot
        run: python bot.py

      - name: Sauvegarde de l'état et du tableau de bord
        run: |
          git config user.name "boussole-bot"
          git config user.email "boussole-bot@users.noreply.github.com"
          git add etat.json README.md
          [ -f courbe.png ] && git add courbe.png || echo "courbe.png pas encore générée (normal au 1er passage)"
          if git diff --cached --quiet; then
            echo "Rien à sauvegarder."
          else
            git commit -m "Cycle du $(TZ=Europe/Paris date '+%d/%m/%Y %H:%M') (Paris)"
            git pull --rebase --autostash || true
            git push
          fi
